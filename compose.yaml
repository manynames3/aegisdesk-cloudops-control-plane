services:
  api:
    build:
      context: ./services/api
    ports:
      - "8000:8000"
    environment:
      AEGISDESK_PERSONA_ISSUER_ENABLED: "true"
      AEGISDESK_AUTH_SECRET: "local-compose-secret-change-me"
      AEGISDESK_DB_PATH: "/app/data/aegisdesk.db"
      AEGISDESK_POLICY_MODE: "opa"
      AEGISDESK_OPA_TIMEOUT_SECONDS: "0.75"
      OPA_URL: "http://opa:8181"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318/v1/traces"
      OTEL_SERVICE_NAME: "aegisdesk-api"
    volumes:
      - api-data:/app/data
    depends_on:
      - opa
      - jaeger
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

  opa:
    image: openpolicyagent/opa:latest-rootless
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies
    ports:
      - "8181:8181"
    volumes:
      - ./policies:/policies:ro
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.63.0
    ports:
      - "16686:16686"
      - "4318:4318"
    restart: unless-stopped

volumes:
  api-data:
