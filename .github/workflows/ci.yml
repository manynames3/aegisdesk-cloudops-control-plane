name: ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docs-scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify required documentation exists
        run: |
          test -f README.md
          test -f docs/product/why-this-exists.md
          test -f docs/product/target-users.md
          test -f docs/product/use-cases.md
          test -f docs/product/positioning.md
          test -f docs/product/buyer-personas.md
          test -f docs/product/use-cases-for-cloudops.md
          test -f docs/product/roi.md
          test -f docs/product/enterprise-value.md
          test -f docs/product/frontend-spec.md
          test -f docs/architecture.md
          test -f docs/architecture/system-architecture.md
          test -f docs/architecture/api-contracts.md
          test -f docs/architecture/audit-event-model.md
          test -f docs/deployment/self-hosted.md
          test -f docs/integrations/README.md
          test -f docs/integrations/codex-mcp.md
          test -f docs/adrs/README.md
          test -f docs/adrs/001-cloudops-control-plane.md
          test -f docs/adrs/002-local-first-runtime.md
          test -f docs/adrs/003-policy-outside-the-model.md
          test -f docs/adrs/004-destructive-action-boundary.md
          test -f docs/adrs/006-cognito-persona-auth-boundary.md
          test -f docs/adrs/007-low-cost-aws-deployment.md
          test -f docs/adrs/008-real-bedrock-dynamodb-mcp.md
          test -f docs/evidence/README.md
          test -f docs/evidence/live-operations.md
          test -f docs/evidence/screenshots/policy-aware-chat.png
          test -f docs/security/security-overview.md
          test -f docs/security/data-handling.md
          test -f docs/security/threat-model.md
          test -f docs/sales/product-brief.md
          test -f docs/sales/walkthrough-video-script.md
          test -f docs/sales/why-not-chatgpt-or-claude.md
          test -f compose.yaml
          test -f policies/chat_policy.rego
          test -f policies/model_routing.rego
          test -f policies/tool_authorization.rego
          test -f policies/quota.rego
          test -f infra/terraform/main.tf
          test -f services/mcp-tools/server.py

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install API dependencies
        working-directory: services/api
        run: pip install -r requirements.txt
      - name: Check Python dependency compatibility
        working-directory: services/api
        run: python -m pip check
      - name: Run API tests
        working-directory: services/api
        run: pytest tests
      - name: Run control evals
        run: python evals/run_evals.py

  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install OPA
        run: |
          curl -fsSL -o opa https://openpolicyagent.org/downloads/v1.16.1/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version
      - name: Run Rego policy tests
        run: opa test policies

  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install MCP dependencies
        working-directory: services/mcp-tools
        run: pip install -r requirements.txt
      - name: Import MCP server
        working-directory: services/mcp-tools
        run: python -c "import server; assert server.mcp"
      - name: Smoke test MCP tools
        run: python scripts/smoke-mcp-tools.py --server-python python

  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Terraform
        run: |
          curl -fsSLo terraform.zip https://releases.hashicorp.com/terraform/1.14.9/terraform_1.14.9_linux_amd64.zip
          unzip -q terraform.zip
          sudo mv terraform /usr/local/bin/terraform
          terraform version
      - name: Validate Terraform formatting
        run: terraform -chdir=infra/terraform fmt -check
      - name: Initialize Terraform without backend
        run: terraform -chdir=infra/terraform init -backend=false
      - name: Validate Terraform
        run: terraform -chdir=infra/terraform validate

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Audit web dependencies
        working-directory: apps/web
        run: npm audit --audit-level=critical
      - name: Build web app
        working-directory: apps/web
        run: npm run build

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate Compose file
        run: docker compose config
      - name: Build API image
        run: docker build -t aegisdesk-api:ci services/api
      - name: Build web image
        run: docker build -t aegisdesk-web:ci apps/web
      - name: Build MCP tools image
        run: docker build -t aegisdesk-mcp-tools:ci services/mcp-tools
