name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required documentation exists
        run: |
          test -f README.md
          test -f docs/product/why-this-exists.md
          test -f docs/product/target-users.md
          test -f docs/product/use-cases.md
          test -f docs/product/enterprise-value.md
          test -f docs/product/frontend-demo-spec.md
          test -f docs/architecture.md
          test -f docs/architecture/system-architecture.md
          test -f docs/architecture/api-contracts.md
          test -f docs/architecture/audit-event-model.md
          test -f docs/adrs/README.md
          test -f docs/adrs/001-cloudops-control-plane.md
          test -f docs/adrs/002-local-first-mvp.md
          test -f docs/adrs/003-policy-outside-the-model.md
          test -f docs/security/threat-model.md
          test -f docs/delivery/two-week-mvp-plan.md
          test -f compose.yaml
          test -f policies/model_routing.rego
          test -f policies/tool_authorization.rego

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        working-directory: services/api
        run: pip install -r requirements.txt
      - name: Run API tests
        working-directory: services/api
        run: pytest tests

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Build web app
        working-directory: apps/web
        run: npm run build
